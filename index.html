<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f8fafc" />
    <!-- Anti-FOUC: /theme-init.js applies the dark class synchronously before
         first paint. A blocking classic script by design (no defer/module) —
         and an external file so the CSP's script-src needs no 'unsafe-inline'. -->
    <script src="/theme-init.js"></script>
    <!-- iOS PWA meta tags: required for standalone mode on Safari -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Strava Data" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <title>Strava Data Viewer</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
