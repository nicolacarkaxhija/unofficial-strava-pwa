<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f8fafc" />
    <!-- Anti-FOUC: apply dark class synchronously before React mounts.
         Must run inline (not deferred) so the first paint already has the
         correct background colour. Default is light; dark only if the user
         explicitly chose it and it is stored in localStorage. -->
    <script>
      ;(function () {
        var t = localStorage.getItem('theme')
        if (t === 'dark') document.documentElement.classList.add('dark')
      })()
    </script>
    <!-- iOS PWA meta tags: required for standalone mode on Safari -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Strava Data" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <title>Strava Data Viewer</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
